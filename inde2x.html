<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ إمبراطورية يوسف علاء | ساحة بوكاسا 2026</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --red: #ff003c; --gold: #ffb700; --dark: #050505; --cyan: #00f3ff;
            --neon-red: 0 0 10px #ff003c, 0 0 20px #ff003c;
            --neon-gold: 0 0 10px #ffb700, 0 0 20px #ffb700;
            --neon-cyan: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
        }

        * { box-sizing: border-box; transition: 0.3s; scroll-behavior: smooth; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: white; font-family: 'Cairo', sans-serif; height: 100vh; overflow: hidden; }

        /* Animated Background */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1a0005 0%, #000 100%); z-index: -1;
        }

        /* Gate Screen */
        #gate-screen {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .gate-box {
            text-align: center; padding: 50px; border: 2px solid var(--red); border-radius: 20px;
            background: rgba(10,10,10,0.8); box-shadow: var(--neon-red); max-width: 500px; width: 90%;
            animation: pulseGate 2s infinite alternate;
        }
        @keyframes pulseGate { from { box-shadow: 0 0 10px var(--red); } to { box-shadow: 0 0 30px var(--red), 0 0 10px var(--gold); } }
        
        .gate-box h1 { font-family: 'Orbitron'; font-size: 3.5rem; color: var(--gold); text-shadow: var(--neon-gold); margin: 0; letter-spacing: 5px;}
        .gate-input {
            width: 100%; padding: 15px; margin: 30px 0; border-radius: 10px; border: 1px solid var(--cyan);
            background: rgba(0,0,0,0.5); color: white; text-align: center; font-size: 1.2rem; outline: none;
        }
        .gate-input:focus { box-shadow: var(--neon-cyan); }

        /* Main Grid */
        .imperial-grid { display: grid; grid-template-columns: 300px 1fr 350px; height: 100vh; }
        @media (max-width: 1100px) { .imperial-grid { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; } .side-panel { display: none; } }

        /* Panels */
        .side-panel { background: rgba(15,15,15,0.8); border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(5px); }
        .panel-header {
            padding: 15px; background: linear-gradient(90deg, #111, #300008);
            border-bottom: 2px solid var(--red); color: var(--gold); font-weight: 900; text-align: center; font-size: 1.2rem;
        }

        /* Arena */
        .arena-center { display: flex; flex-direction: column; position: relative; }
        .stats-bar {
            padding: 15px 30px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        /* Progress Bar */
        .progress-container { width: 100%; height: 8px; background: #222; position: absolute; top: 0; left: 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--red), var(--gold)); width: 0%; transition: width 0.5s ease-in-out; }

        .quiz-zone { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        #q-text { font-size: 2.2rem; font-weight: 900; margin-bottom: 40px; color: #fff; text-shadow: 2px 2px 10px rgba(255,0,60,0.5); line-height: 1.4; }
        .curriculum-tag { background: var(--cyan); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; font-size: 0.9rem; box-shadow: var(--neon-cyan); }

        /* Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; }
        .action-btn {
            background: #111; border: 2px solid #444; color: white; padding: 20px; border-radius: 12px;
            font-size: 1.2rem; cursor: pointer; font-family: 'Cairo'; font-weight: 700; position: relative; overflow: hidden;
        }
        .action-btn:hover { background: var(--red); border-color: var(--gold); transform: translateY(-5px); box-shadow: var(--neon-red); }

        /* Chat & Radar */
        #chat-flow { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 15px; border-radius: 15px; background: #222; max-width: 85%; font-size: 0.95rem; border-left: 3px solid #555; }
        .bubble.me { align-self: flex-end; background: #300008; border-left: none; border-right: 3px solid var(--red); }
        .bubble.private { background: #001a33; border-color: var(--cyan); }
        .bubble b { color: var(--gold); cursor: pointer; }
        .bubble b:hover { text-decoration: underline; }

        .chat-tools { padding: 15px; background: #0a0a0a; border-top: 1px solid #333; }
        .chat-mode-indicator { font-size: 0.8rem; color: var(--cyan); margin-bottom: 5px; display: none; }
        .chat-input-group { display: flex; gap: 10px; }
        .chat-input-group input { flex-grow: 1; background: #111; border: 1px solid #444; border-radius: 8px; padding: 12px; color: white; outline: none;}
        .chat-input-group input:focus { border-color: var(--gold); }

        /* Active Radar */
        .online-list { padding: 15px; border-bottom: 1px solid #333; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.5); }
        .online-user { display: flex; align-items: center; gap: 10px; padding: 8px; cursor: pointer; border-radius: 8px; }
        .online-user:hover { background: #222; }
        .status-dot { width: 10px; height: 10px; background: #0f0; border-radius: 50%; box-shadow: 0 0 8px #0f0; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }
    </style>
</head>
<body>

<div id="gate-screen">
    <div class="gate-box">
        <h1>BOKASA</h1>
        <p style="color: #aaa; margin-top: 5px; font-weight: bold;">ساحة إمبراطورية يوسف علاء - 2026</p>
        <input type="text" id="p-name" class="gate-input" placeholder="اكتب اسمك القتالي هنا..." autocomplete="off">
        <button class="action-btn" style="width: 100%; border-radius: 50px;" onclick="enterArena()">اقتحام الساحة ⚔️</button>
    </div>
</div>

<div class="imperial-grid">
    <div class="side-panel">
        <div class="panel-header">🏆 قاعة العمالقة</div>
        <div class="honor-list" id="leaderboard-ui" style="padding: 15px;">
            <div style="text-align: center; color: #666; margin-top: 20px;">جاري تحميل الأساطير...</div>
        </div>
    </div>

    <div class="arena-center">
        <div class="progress-container"><div class="progress-bar" id="q-progress"></div></div>
        <div class="stats-bar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="rank-badge" style="background: var(--gold); color: black; padding: 4px 12px; border-radius: 8px; font-weight: 900; box-shadow: var(--neon-gold);">جندي مستجد</span>
                <span id="ui-name" style="font-weight: 900; font-size: 1.2rem; color: white;">---</span>
            </div>
            <div style="font-family: 'Orbitron'; color: var(--gold); font-size: 1.5rem; text-shadow: var(--neon-gold);">
                PTS: <span id="ui-score">0</span>
            </div>
        </div>

        <div class="quiz-zone">
            <div id="q-category" class="curriculum-tag" style="display: none;"></div>
            <div id="q-text">هل أنت مستعد لمواجهة 70 سؤالاً خارقاً؟</div>
            <div class="btn-grid" id="opt-container">
                <button class="action-btn" style="grid-column: span 2;" onclick="startEngine()">بدء المحاكمة 🔥</button>
            </div>
        </div>
    </div>

    <div class="side-panel">
        <div class="panel-header">📡 رادار النشطين</div>
        <div class="online-list" id="online-users-ui"></div>
        
        <div class="panel-header" style="border-top: 1px solid #333;">💬 الاتصالات اللاسلكية</div>
        <div id="chat-flow"></div>
        <div class="chat-tools">
            <div id="chat-mode" class="chat-mode-indicator">التحدث للجميع</div>
            <div class="chat-input-group">
                <input type="text" id="chat-in" placeholder="أرسل رسالة..." onkeypress="if(event.key === 'Enter') broadcast()">
                <button class="action-btn" style="padding: 10px 20px;" onclick="broadcast()">إرسال</button>
            </div>
        </div>
    </div>
</div>

    // خوارزمية منع التكرار (Fisher-Yates Shuffle)
    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled; // يرجع نسخة عشوائية بالكامل
    }
