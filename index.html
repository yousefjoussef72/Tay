<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ ساحة بوكاسا العظمى | يوسف علاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --red: #ff003c; --gold: #ffb700; --black: #050505; }
        body, html { margin: 0; padding: 0; background: var(--black); font-family: 'Cairo', sans-serif; color: #fff; height: 100vh; overflow: hidden; }
        
        .game-wrapper { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; border: 2px solid var(--red); background: #0a0a0a; }
        
        /* شريط النقاط */
        .score-bar { display: flex; justify-content: space-between; padding: 15px; background: #111; border-bottom: 2px solid var(--gold); }
        .stat { text-align: center; }
        .stat span { display: block; color: var(--gold); font-size: 20px; font-weight: 900; }

        /* منطقة الأسئلة المتغيرة */
        .q-section { padding: 30px 20px; text-align: center; background: linear-gradient(to bottom, #111, #000); border-bottom: 2px solid #222; }
        .q-card { min-height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        #question-text { font-size: 22px; text-shadow: 0 0 10px var(--red); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #1a1a1a; border: 1px solid var(--red); color: #fff; padding: 15px; border-radius: 12px; cursor: pointer; font-family: 'Cairo'; transition: 0.2s; }
        .opt:hover { background: var(--red); transform: scale(1.02); }

        /* منطقة الشات والدردشة (Tidio / Chat) */
        .chat-area { flex-grow: 1; position: relative; background: #050505; }
        .custom-chat-box { height: 100%; width: 100%; border: none; }

        /* شريط معلوماتي */
        .battle-info { font-size: 12px; text-align: center; padding: 5px; color: #555; background: #000; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="score-bar">
        <div class="stat">الرتبة<span>محارب</span></div>
        <div class="stat">نقاطك<span id="score">0</span></div>
        <div class="stat">السؤال<span id="q-num">1/35</span></div>
    </div>

    <div class="q-section" id="game-ui">
        <div class="q-card">
            <h2 id="question-text">جاري تجهيز الأسئلة...</h2>
        </div>
        <div class="options-grid" id="options">
            </div>
    </div>

    <div class="chat-area">
        <p style="text-align: center; color: var(--gold); font-size: 14px; margin: 10px 0;">💬 دردشة المبارزة المباشرة</p>
        </div>

    <div class="battle-info">مملكة يوسف علاء - الإصدار القتالي v2.0</div>
</div>

<script src="//code.tidio.co/YOUR_CODE_HERE.js" async></script>

<script>
    // ⚔️ بنك الأسئلة (تقدر تضيف لحد 35 سؤال هنا بنفس الطريقة)
    const questions = [
        { q: "من هو بطل أنمي ون بيس؟", opts: ["لوفي", "زورو", "سانجي", "نامي"], a: 0 },
        { q: "ما هو اسم عين ساسكي؟", opts: ["بياكوغان", "رينغان", "شارينغان", "جيتان"], a: 2 },
        { q: "من قتل إيتاتشي؟", opts: ["ناروتو", "ساسكي", "مادارا", "كاكاشي"], a: 1 },
        { q: "ما اسم والد لوفي؟", opts: ["جارب", "دراجون", "شانكس", "روجر"], a: 1 },
        // ... كرر ده لحد 35 سؤال
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuestion() {
        if(currentQ >= questions.length) {
            Swal.fire({ title: 'انتهت المبارزة!', text: `نقاطك النهائية: ${score}`, icon: 'success' });
            return;
        }
        
        const qData = questions[currentQ];
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('q-num').innerText = `${currentQ + 1}/${questions.length}`;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        qData.opts.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'opt';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(idx) {
        if(idx === questions[currentQ].a) {
            score += 100;
            document.getElementById('score').innerText = score;
            currentQ++;
            loadQuestion();
        } else {
            Swal.fire({ title: 'خطأ!', text: 'حاول في السؤال القادم', icon: 'error', timer: 1000, showConfirmButton: false });
            currentQ++;
            loadQuestion();
        }
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
