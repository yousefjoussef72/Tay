<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ إمبراطورية يوسف علاء الملقب ب غابيمارو الاسود | ساحة بوكاسا 2026</title>

    <script src=" https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js "></script>
    <script src=" https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js "></script>

    <link href=" https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap " rel="stylesheet">
    <script src=" https://cdn.jsdelivr.net/npm/sweetalert2@11 "></script>
    <script src=" https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js "></script>

    <style>
        :جيثس {
            --أحمر: #ff003c؛ --ذهبي: #ffb700؛ --داكن: #050505؛ --سماوي: #00f3ff؛
            --neon-red: 0 0 10px #ff003c, 0 0 20px #ff003c;
            --neon-gold: 0 0 10px #ffb700, 0 0 20px #ffb700;
            --neon-cyan: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
        }

        * { box-sizing: border-box; transition: 0.3s; scroll-behavior: smooth; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: white; font-family: 'Cairo', sans-serif; height: 100vh; overflow: hidden; }

        body::before {
            المحتوى: ""; الموضع: ثابت؛ الإزاحة الداخلية: 0؛
            الخلفية: تدرج شعاعي (دائرة في المركز، #1a0005 0%، #000 100%)؛ مؤشر ض: -1؛
        }

        مستر س {
            الموضع: ثابت؛ الإزاحة الداخلية: 0؛ مؤشر ض: 10000؛
            الخلفية: rgba(0,0,0,0.95); العرض: مرن؛ تشمل العناصر: توسيت؛ تبرير المحتوى: توسيط؛ الفلتر الخلفي: ضبابية (10 بيكسل)؛
        }
        .gate-box {
            text-align: center; padding: 50px; border: 2px solid var(--red); border-radius: 20px;
            الخلفية: rgba(10,10,10,0.8); الحدث: var(--neon-red); العرض الأقصى: 500 بكسل؛ العرض: 90%؛
            الرسوم المتحركة: بوابة نبضية 2 ثانية بديلة لا نهائية؛
        }
        @keyframes pulseGate { from { box-shadow: 0 0 10px var(--red); } to { box-shadow: 0 0 30px var(--red), 0 0 10px var(--gold); } }
        
        .gate-box h1 { font-family: 'Orbitron'; font-size: 3.5rem; color: var(--gold); text-shadow: var(--neon-gold); margin: 0; letter-spacing: 5px;}
        .gate-input {
            العرض: 100%؛ الحشود: 15 بكسل؛ الهامش: 30 بكسل 0؛ نصف قطر الهيكل: 10 بكسل؛ الحد: 1 بكسل ثابت var(--سماوي)؛
            الخلفية: rgba(0,0,0,0.5); اللون: أبيض؛ لصق النص: توسيط؛ حجم الخط: 1.2 ريم؛ الإطار: لا يوجد؛
        }
        .gate-input:focus { box-shadow: var(--neon-cyan); }

        .imperial-grid { display: grid; grid-template-columns: 300px 1fr 350px; height: 100vh; }
        @media (max-width: 1100px) { .imperial-grid { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; } .side-panel { display: none; } }

        .side-panel { background: rgba(15,15,15,0.8); border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(5px); }
        .panel-header {
            الحشود: 15 بكسل؛ الخلفية: تدرج خطي (90 درجة، #111، #300008)؛
            border-bottom: 2px solid var(--red); color: var(--gold); font-weight: 900; text-align: center; font-size: 1.2rem;
        }

        .arena-center { display: flex; flex-direction: column; position: relative; }
        .stats-bar {
            الحشود: 15 بكسل 30 بكسل؛ الخلفية: rgba(0,0,0,0.8); العرض: مرن؛ تبرير المحتوى: مسافة بين العناصر؛ تشمل العناصر: توسيت؛
            border-bottom: 2px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        .progress-container { width: 100%; height: 8px; background: #222; position: absolute; top: 0; left: 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--red), var(--gold)); width: 0%; transition: width 0.5s ease-in-out; }

        .quiz-zone { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        #q-text { font-size: 1.8rem; font-weight: 900; margin-bottom: 30px; color: #fff; text-shadow: 2px 2px 10px rgba(255,0,60,0.5); line-height: 1.4; }
        .curriculum-tag { background: var(--cyan); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; font-size: 0.9rem; box-shadow: var(--neon-cyan); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 700px; }
        .action-btn {
            background: #111; border: 2px solid #444; color: white; padding: 15px; border-radius: 12px;
            font-size: 1.1rem; cursor: pointer; font-family: 'Cairo'; font-weight: 700; position: relative;
        }
        .action-btn:hover { background: var(--red); border-color: var(--gold); transform: translateY(-3px); box-shadow: var(--neon-red); }

        #chat-flow { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 12px; border-radius: 15px; background: #222; max-width: 85%; font-size: 0.9rem; border-left: 3px solid #555; }
        .bubble.me { align-self: flex-end; background: #300008; border-right: 3px solid var(--red); border-left: none;}

        .chat-tools { padding: 15px; background: #0a0a0a; border-top: 1px solid #333; }
        .chat-input-group { display: flex; gap: 5px; }
        .chat-input-group input { flex-grow: 1; background: #111; border: 1px solid #444; border-radius: 8px; padding: 10px; color: white; outline: none;}

        .online-list { padding: 10px; border-bottom: 1px solid #333; max-height: 150px; overflow-y: auto; }
        .status-dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; display: inline-block; margin-left: 5px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--red); }
    </style>
</head>
<body>

<div id="gate-screen">
    <div class="gate-box">
        <h1>BOKASA</h1>
        <p style="color: var(--gold); font-weight: bold;">يوسف علاء يقدم: تحدي 1 ثانوي 2026</p>
        <input type="text" id="p-name" class="gate-input" placeholder="اسمك القتالي (للسجل التاريخي)..." autocomplete="off">
        <button class="action-btn" style="width: 100%; border-radius: 50px;" onclick="enterArena()">اقتحام الساحة ⚔️</button>
    </div>
</div>

<div class="imperial-grid">
    <div class="side-panel">
        <div class="panel-header">🏆 قاعة العمالقة</div>
        <div id="leaderboard-ui" style="padding: 10px;"></div>
        
        <div style="margin-top: auto; padding: 20px;">
            <button onclick="uploadNewData()" style="width:100%; font-size:0.7rem; background:#333; color:#888; border:1px dashed #555; cursor:pointer; padding:5px;">تحديث بنك الأسئلة السحابي 📤</button>
        </div>
    </div>

    <div class="arena-center">
        <div class="progress-container"><div class="progress-bar" id="q-progress"></div></div>
        <div class="stats-bar">
            <div>
                <span id="rank-badge" style="background: var(--gold); color: black; padding: 4px 10px; border-radius: 8px; font-weight: 900;">جندي</span>
                <span id="ui-name" style="margin-right: 10px; font-weight: bold;">---</span>
            </div>
            <div style="font-family: 'Orbitron'; color: var(--gold); font-size: 1.4rem;">
                PTS: <span id="ui-score">0</span>
            </div>
        </div>

        <div class="quiz-zone">
            <div id="q-category" class="curriculum-tag">جاري التحميل...</div>
            <div id="q-text">هل أنت مستعد للملحمة؟</div>
            <div class="btn-grid" id="opt-container">
                <button class="action-btn" style="grid-column: span 2;" onclick="startEngine()">ابدأ الاختبار الآن 🔥</button>
            </div>
        </div>
    </div>

    <div class="side-panel">
        <div class="panel-header">📡 الرادار والاتصالات</div>
        <div class="online-list" id="online-users-ui"></div>
        <div id="chat-flow"></div>
        <div class="chat-tools">
            <div class="chat-input-group">
                <input type="text" id="chat-in" placeholder="أرسل رسالة..." onkeypress="if(event.key === 'Enter') broadcast()">
                <button onclick="broadcast()" style="background:var(--red); border:none; color:white; padding:10px; border-radius:8px; cursor:pointer;">إرسال</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚙️ إعدادات Firebase الخاصة بك (لا تلمسها)
    const firebaseConfig = {
        apiKey: "AIzaSyDXr5aORgONB7Cvq9qTru3Y_v0-dLzVYNA",
        authDomain: "tay-game.firebaseapp.com",
        databaseURL: "https://tay-game-default-rtdb.firebaseio.com",
        projectId: "tay-game",
        storageBucket: "tay-game.firebasestorage.app",
        messagingSenderId: "313499272374",
        appId: "1:313499272374:web:26b693f457239555365217"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myData = { name: "", score: 0, rank: "جندي مستجد" };
    let currentQuestions = [];
    let currentQIndex = 0;

    // 📚 مجمع الأسئلة الأسطوري (70 سؤالاً للمنهج والأنمي والذكاء)
    const rawQuestions = [
        // --- اللغة العربية (ترم ثاني) ---
        { t: "عربي - نحو", q: "ما إعراب 'طالباً' في: 'ما حضر من الطلاب إلا طالباً'؟", o: ["بدل مرفوع", "مستثنى منصوب وجوباً", "مستثنى منصوب أو بدل", "فاعل"], a: 2 },
        { t: "عربي - أدب", q: "أشهر شعراء مدرسة الإحياء والبعث هو:", o: ["أحمد شوقي", "المتنبي", "بشار بن برد", "خليل مطران"], a: 0 },
        { t: "عربي - بلاغة", q: "نوع التشبيه في 'الجندي كأنه الأسد في شجاعته':", o: ["بليغ", "مجمل", "مفصل", "تمثيلي"], a: 2 },
        // --- الفيزياء (ترم ثاني) ---
        { t: "فيزياء", q: "جسم يدور في مسار دائري، إذا زادت السرعة للضعف وزاد القطر للضعف، القوة الجاذبة:", o: ["تظل ثابتة", "تزداد للضعف", "تقل للنصف", "تزداد 4 أمثال"], a: 1 },
        { t: "فيزياء", q: "حسب قانون نيوتن الثاني، العجلة تتناسب طردياً مع:", o: ["الكتلة", "السرعة", "القوة المحصلة", "الزمن"], a: 2 },
        // --- الكيمياء (ترم ثاني) ---
        { t: "كيمياء", q: "في التفاعلات الماصة للحرارة، تكون قيمة التغير الحراري ΔH:", o: ["سالبة", "موجبة", "صفر", "لا يمكن تحديدها"], a: 1 },
        { t: "كيمياء - نووية", q: "الجسيم الذي كتلته 4 وشحنته +2 هو:", o: ["بيتا", "جاما", "ألفا", "بروتون"], a: 2 },
        // --- الأحياء (ترم ثاني) ---
        { t: "أحياء - وراثة", q: "عند تزاوج فصيلة دم A نقية مع فصيلة O، تكون نسبة الأبناء O هي:", o: ["100%", "50%", "25%", "0%"], a: 3 },
        { t: "أحياء", q: "أي من هذه الممالك تعتبر بدائية النواة؟", o: ["الفطريات", "الطلائعيات", "البدائيات", "النبات"], a: 2 },
        // --- الرياضيات (ترم ثاني) ---
        { t: "رياضيات - مصفوفات", q: "المصفوفة (3×2) يمكن ضربها في مصفوفة من النظم:", o: ["2×5", "3×1", "1×2", "5×3"], a: 0 },
        { t: "رياضيات", q: "الزاوية بين المتجهين (3,0) و (0,4) تساوي:", o: ["30", "45", "90", "180"], a: 2 },
        // --- الإنجليزي ---
        { t: "English", q: "If it ______ tomorrow, we will stay at home.", o: ["rain", "rains", "rained", "will rain"], a: 1 },
        { t: "English", q: "The internet is a double-edged ______.", o: ["knife", "sword", "gun", "tool"], a: 1 },
        // --- أنمي وذكاء (الشطة) ---
        { t: "أنمي - ون بيس", q: "من هو الشخص الذي أعطى لوفي قبعة القش؟", o: ["جارب", "شانكس", "رايلي", "ايس"], a: 1 },
        { t: "ذكاء", q: "إذا كان معك 3 تفاحات وأخذت منها اثنتين، كم تفاحة معك؟", o: ["1", "2", "3", "0"], a: 1 }
        // ... (هنا يمكنك إضافة الـ 55 سؤالاً الباقية بنفس التنسيق لتكمل الـ 70)
    ];

    // خلط الأسئلة
    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function enterArena() {
        const name = document.getElementById('p-name').value.trim();
        if(name.length < 2) return Swal.fire('الاسم قصير!', '', 'error');
        myData.name = name;
        document.getElementById('ui-name').innerText = name;
        document.getElementById('gate-screen').style.display = 'none';
        
        // ربط الرادار
        const statusRef = db.ref('online/' + name);
        statusRef.set({ active: true });
        statusRef.onDisconnect().remove();

        syncLeaderboard();
        syncChat();
        syncOnline();
    }

    function startEngine() {
        currentQuestions = shuffle([...rawQuestions]);
        currentQIndex = 0;
        myData.score = 0;
        document.getElementById('ui-score').innerText = '0';
        loadQ();
    }

    function loadQ() {
        if(currentQIndex >= currentQuestions.length) return win();
        const q = currentQuestions[currentQIndex];
        document.getElementById('q-category').innerText = q.t;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('q-progress').style.width = (currentQIndex / currentQuestions.length * 100) + '%';
        
        const container = document.getElementById('opt-container');
        container.innerHTML = '';
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'action-btn';
            btn.innerText = opt;
            btn.onclick = () => check(i, q.a);
            container.appendChild(btn);
        });
    }

    function check(chosen, correct) {
        if(chosen === correct) {
            myData.score += 100;
            confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
            currentQIndex++;
            updateRank();
            db.ref('leaderboard/' + myData.name).set(myData.score);
            loadQ();
        } else {
            Swal.fire('خطأ!', 'ركز يا بطل المنهج لا يرحم', 'error');
            myData.score = Math.max(0, myData.score - 20);
            document.getElementById('ui-score').innerText = myData.score;
        }
    }

    function updateRank() {
        const badge = document.getElementById('rank-badge');
        if(myData.score > 2000) myData.rank = "أسطورة 🐉";
        وإلا إذا كانت نتيجة بياناتي أكبر من 1000، فإن ترتيب بياناتي يساوي "المركز ⚔️".
        وإلا إذا كانت نتيجة myData أكبر من 500، فإن ترتيب myData يساوي "فارس 🛡️"؛
        badge.innerText = myData.rank;
        document.getElementById('ui-score').innerText = myData.score;
    }

    دالة الفوز() {
        Swal.fire('تم الختم! 🏆', `مجموعك: ${myData.score}`, 'success');
        document.getElementById('opt-container').innerHTML = `<button class="action-btn" style="grid-column:span 2;" onclick="startEngine()">إعادة صح 🔄</button>`;
    }

    // --- أنظمة التوزيع ---
    دالة syncLeaderboard() {
        db.ref('leaderboard').orderByValue().limitToLast(5).on('value', snap => {
            const ui = document.getElementById('leaderboard-ui');
            ui.innerHTML = '';
            let list = [];
            snap.forEach(c => list.push({n: c.key, s: c.val()}));
            list.reverse().forEach((p, i) => {
                ui.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222;">
                    <span>#${i+1} ${pn}</span> <b style="color:var(--gold)">${ps}</b>
                </div>`;
            });
        });
    }

    دالة البث() {
        const msg = document.getElementById('chat-in').value;
        إذا لم تكن هناك رسالة، فقم بالخروج.
        db.ref('chat').push({ u: myData.name , m: msg });
        document.getElementById('chat-in').value = '';
    }

    دالة syncChat() {
        db.ref('chat').limitToLast(15).on('child_added', snap => {
            const data = snap.val();
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = 'bubble ' + (data.u === myData.name ? 'me' : '');
            div.innerHTML = `<b>${data.u}:</b> ${data.m}`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        });
    }

    دالة syncOnline() {
        db.ref('online').on('value', snap => {
            const ui = document.getElementById('online-users-ui');
            ui.innerHTML = '';
            snap.forEach(c => {
                ui.innerHTML += `<div><span class="status-dot"></span> ${c.key}</div>`;
            });
        });
    }

    // غرض "الكود القديم": رفع الأسئلة لقاعدة البيانات بضغطة زر
    دالة رفع البيانات الجديدة() {
        db.ref('exams/questions_2026').set(rawQuestions)
        .then(() => Swal.fire('تم التحديث!', 'تم رفع 70 سؤالاً للسحب الفعالة', 'success'));
    }

</script>
</body>
</html>
