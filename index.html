<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي يوسف علاء - 1 ثانوى 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --main: #00d2ff; --bg: #0a0a0c; --panel: #161b22; --accent: #ff007a; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; }
        
        /* تأثيرات زخرفة المؤسس يوسف علاء */
        .founder-header { position: absolute; width: 100%; text-align: center; padding: 10px; background: linear-gradient(90deg, transparent, var(--accent), transparent); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px var(--accent); z-index: 10; }
        
        /* تقسيم الشاشة */
        .side { width: 20%; background: var(--panel); border-left: 1px solid #30363d; padding: 15px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .chat-area { width: 25%; background: var(--panel); border-right: 1px solid #30363d; display: flex; flex-direction: column; }

        /* اللعبة */
        .card { background: #0d1117; border: 1px solid var(--main); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 500px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); }
        .btn-opt { display: block; width: 100%; margin: 10px 0; padding: 12px; background: transparent; border: 1px solid var(--main); color: white; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .btn-opt:hover { background: var(--main); color: black; }
        
        /* الدردشة */
        #chat-content { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.9rem; }
        .msg-in { background: #21262d; padding: 5px 10px; border-radius: 10px; margin-bottom: 5px; }
        .online-user { color: #3fb950; font-size: 0.8rem; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="founder-header">◈ مـطـور الـلـعـبـة: يـوسـف عـلاء ◈</div>

<div class="side">
    <h3>🏆 المتصدرين</h3>
    <div id="leaderboard"></div>
    <hr>
    <h3>🟢 المتصلون</h3>
    <div id="online-list"></div>
</div>

<div class="main">
    <div class="card">
        <div id="lvl-tag" style="color: var(--accent); font-size: 0.8rem;">المستوى: سهل</div>
        <h2 id="q-text">جاري تحميل التحدي...</h2>
        <div id="opts"></div>
        <div style="margin-top: 20px;">
            نقاطك: <span id="score">0</span> | الرتبة: <span id="rank">مستجد</span>
        </div>
    </div>
    <button onclick="addQuestion()" style="margin-top:20px; background:none; color:gray; border:none; cursor:pointer;">+ اقترح سؤالاً</button>
</div>

<div class="chat-area">
    <h4 style="text-align:center;">💬 شات الطلاب</h4>
    <div id="chat-content"></div>
    <div style="display:flex; padding:10px;">
        <input type="text" id="chat-msg" style="flex:1; padding:5px;" placeholder="اكتب هنا...">
        <button onclick="sendMsg()">➤</button>
    </div>
</div>

<script>
    // إعداداتك الخاصة
    const firebaseConfig = {
        apiKey: "AIzaSyDXr5aORgONB7Cvq9qTru3Y_v0-dLzVYNA",
        authDomain: "tay-game.firebaseapp.com",
        databaseURL: "https://tay-game-default-rtdb.firebaseio.com",
        projectId: "tay-game",
        storageBucket: "tay-game.firebasestorage.app",
        messagingSenderId: "313499272374",
        appId: "1:313499272374:web:26b693f457239555365217"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = prompt("أدخل اسمك يا بطل:") || "طالب";
    let score = 0;

    // نظام الرتب
    function getRank(s) {
        if(s > 500) return "إمبراطور يوسف علاء 👑";
        if(s > 300) return "دحيح الدفعة 📚";
        if(s > 100) return "مقاتل أنمي 🔥";
        return "طالب مستجد";
    }

    // الوجود والاتصال
    const userRef = db.ref('status/' + myName);
    userRef.set({ name: myName, score: 0, rank: "مستجد" });
    userRef.onDisconnect().remove();

    // تحديث القوائم
    db.ref('status').on('value', snap => {
        let html = '';
        snap.forEach(child => {
            html += `<div class="online-user">● ${child.val().name} (${child.val().score})</div>`;
        });
        document.getElementById('online-list').innerHTML = html;
    });

    // سحب الأسئلة (صعوبة تدريجية وعشوائية)
    function loadQ() {
        let difficulty = "easy";
        if (score > 50) difficulty = "medium";
        if (score > 150) difficulty = "hard";

        document.getElementById('lvl-tag').innerText = "المستوى: " + difficulty;

        db.ref('questions/' + difficulty).once('value').then(snap => {
            const data = snap.val();
            const keys = Object.keys(data);
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            const q = data[randomKey];

            document.getElementById('q-text').innerText = q.text;
            const optDiv = document.getElementById('opts');
            optDiv.innerHTML = '';
            q.options.forEach(o => {
                let b = document.createElement('button');
                b.className = 'btn-opt';
                b.innerText = o;
                b.onclick = () => {
                    if(o === q.answer) {
                        score += 10;
                        alert("صح! استمر");
                    } else {
                        alert("خطأ! حاول تاني");
                    }
                    userRef.update({ score: score, rank: getRank(score) });
                    document.getElementById('score').innerText = score;
                    document.getElementById('rank').innerText = getRank(score);
                    loadQ();
                };
                optDiv.appendChild(b);
            });
        });
    }

    // الشات
    function sendMsg() {
        let m = document.getElementById('chat-msg').value;
        if(m) {
            db.ref('chat').push({ name: myName, text: m });
            document.getElementById('chat-msg').value = '';
        }
    }
    db.ref('chat').limitToLast(20).on('child_added', snap => {
        document.getElementById('chat-content').innerHTML += `<div class="msg-in"><b>${snap.val().name}:</b> ${snap.val().text}</div>`;
        document.getElementById('chat-content').scrollTop = 9999;
    });

    function addQuestion() {
        let q = prompt("اكتب السؤال:");
        let a = prompt("اكتب الإجابة الصحيحة:");
        if(q && a) db.ref('suggestions').push({ q, a, by: myName });
    }

    loadQ();
</script>
</body>
</html>
