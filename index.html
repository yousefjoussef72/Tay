<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المتفوقين 2026 - الترم الثاني</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .subject-tag { display: inline-block; background: var(--primary); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; margin-bottom: 10px; }
        .question-box { margin-top: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { cursor: pointer; padding: 12px; border: none; border-radius: 8px; transition: 0.3s; font-weight: bold; }
        .opt-btn { background: #f8f9fa; border: 1px solid #ccc; }
        .opt-btn:hover { background: var(--accent); color: white; }
        .nav-btns { display: flex; justify-content: space-between; margin-top: 20px; }
        .admin-panel { margin-top: 50px; padding: 15px; background: #ffeaa7; border-radius: 10px; font-size: 0.8em; }
        #status { text-align: center; font-weight: bold; color: green; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 بنك أسئلة 1 ثانوي - 2026</h1>
    <div id="status">جاري الاتصال بالسحابة...</div>

    <div id="quiz-area" style="display:none;">
        <div id="subject-name" class="subject-tag">المادة</div>
        <div class="question-box">
            <h3 id="question-text">السؤال سيظهر هنا؟</h3>
            <div class="options" id="options-container">
                </div>
        </div>
        <div class="nav-btns">
            <button onclick="nextQuestion()" style="background: var(--primary); color: white;">السؤال التالي ⬅️</button>
            <div id="score-board">النتيجة: 0</div>
        </div>
    </div>

    <div class="admin-panel">
        <p>⚡ **منطقة المطور (يوسف علاء):** اضغط هنا لرفع جميع الأسئلة الجديدة لقاعدة بياناتك (مرة واحدة فقط).</p>
        <button onclick="uploadAllQuestions()" style="background: #d63031; color: white;">تحديث قاعدة البيانات بالأسئلة 📤</button>
    </div>
</div>

<script>
// 1. إعدادات Firebase الخاصة بك (التي أرسلتها)
const firebaseConfig = {
  apiKey: "AIzaSyDXr5aORgONB7Cvq9qTru3Y_v0-dLzVYNA",
  authDomain: "tay-game.firebaseapp.com",
  databaseURL: "https://tay-game-default-rtdb.firebaseio.com",
  projectId: "tay-game",
  storageBucket: "tay-game.firebasestorage.app",
  messagingSenderId: "313499272374",
  appId: "1:313499272374:web:26b693f457239555365217"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 2. بنك الأسئلة الضخم (جميع المواد - ترم ثاني 2026)
const questionsBank = [
    // لغة عربية
    { sub: "لغة عربية", q: "نوع الاستثناء في 'ما محمد إلا رسول':", opts: ["تام مثبت", "تام منفي", "ناقص منفي", "منقطع"], ans: "ناقص منفي" },
    { sub: "لغة عربية", q: "الاسم المقصود مما يلي هو:", opts: ["القاضي", "يسعى", "العليا", "متى"], ans: "العليا" },
    
    // فيزياء (استخدام LaTeX للأرقام المعقدة لو لزم)
    { sub: "فيزياء", q: "جسم كتلته 10 كجم يتحرك بسرعة 5 م/ث، تكون كمية تحركه:", opts: ["2 كجم.م/ث", "50 كجم.م/ث", "15 كجم.م/ث", "0.5 كجم.م/ث"], ans: "50 كجم.م/ث" },
    { sub: "فيزياء", q: "النسبة بين القوة والعجلة حسب قانون نيوتن الثاني هي:", opts: ["السرعة", "الزمن", "الكتلة", "الشغل"], ans: "الكتلة" },

    // كيمياء
    { sub: "كيمياء", q: "في التفاعل الطارد للحرارة، تكون قيمة $ΔH$ دائماً:", opts: ["موجبة", "سالبة", "صفر", "غير محددة"], ans: "سالبة" },
    { sub: "كيمياء", q: "وحدة قياس الحرارة النوعية هي:", opts: ["J/g", "J/g.°C", "Calorie", "Watt"], ans: "J/g.°C" },

    // رياضيات
    { sub: "رياضيات", q: "المصفوفة التي يكون فيها عدد الصفوف يساوي عدد الأعمدة تسمى:", opts: ["مصفوفة صف", "مصفوفة قطرية", "مصفوفة مربعة", "مصفوفة الوحدة"], ans: "مصفوفة مربعة" },
    { sub: "رياضيات", q: "إذا كان المتجه أ = (3، 4) فإن معيار المتجه يساوي:", opts: ["7", "1", "5", "25"], ans: "5" },

    // أحياء
    { sub: "أحياء", q: "فصيلة الدم التي تسمى بالمعطي العام هي:", opts: ["A", "B", "AB", "O"], ans: "O" },
    { sub: "أحياء", q: "عدد الكروموسومات في الخلية الجسدية لذكر إنسان داون هو:", opts: ["46", "47", "45", "44"], ans: "47" },

    // إنجليزي
    { sub: "English", q: "Technology has many ______ that improve our lives.", opts: ["disadvantages", "benefits", "crimes", "faults"], ans: "benefits" },
    { sub: "English", q: "If I _____ enough money, I would buy a new laptop.", opts: ["have", "had", "will have", "had had"], ans: "had" },

    // جغرافيا وتاريخ
    { sub: "جغرافيا", q: "أكبر المحافظات المصرية سكاناً هي محافظة:", opts: ["الجيزة", "القاهرة", "الإسكندرية", "المنيا"], ans: "القاهرة" },
    { sub: "تاريخ", q: "اشتهرت مدينة إسبرطة في بلاد اليونان بنظامها:", opts: ["الديمقراطي", "العسكري", "الثقافي", "التجاري"], ans: "العسكري" }
];

let currentQIndex = 0;
let allFetchedQuestions = [];
let score = 0;

// 3. وظيفة الرفع (تستخدمها مرة واحدة لتملأ الـ Database عندك)
function uploadAllQuestions() {
    const questionsRef = db.ref('exams/term2_2026');
    questionsRef.set(questionsBank)
        .then(() => alert("✅ تم رفع الأسئلة بنجاح لقاعدة بيانات Firebase!"))
        .catch(err => console.error("خطأ في الرفع:", err));
}

// 4. جلب الأسئلة من Firebase عند التشغيل
function loadQuestionsFromDB() {
    document.getElementById('status').innerText = "جاري تحميل الأسئلة من السحابة... ⏳";
    db.ref('exams/term2_2026').once('value', (snapshot) => {
        allFetchedQuestions = snapshot.val();
        if (allFetchedQuestions) {
            document.getElementById('status').innerText = "✅ تم الاتصال بنجاح!";
            document.getElementById('quiz-area').style.display = 'block';
            displayQuestion();
        } else {
            document.getElementById('status').innerText = "قاعدة البيانات فارغة! اضغط على زر التحديث بالأسفل.";
        }
    });
}

function displayQuestion() {
    if (currentQIndex >= allFetchedQuestions.length) {
        alert("انتهت الأسئلة! مستواك ممتاز.");
        currentQIndex = 0;
    }
    const qData = allFetchedQuestions[currentQIndex];
    document.getElementById('subject-name').innerText = qData.sub;
    document.getElementById('question-text').innerText = qData.q;
    
    const optionsDiv = document.getElementById('options-container');
    optionsDiv.innerHTML = '';
    
    qData.opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt, qData.ans);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selected, correct) {
    if (selected === correct) {
        alert("بطل! إجابة صحيحة ✨");
        score += 10;
    } else {
        alert("للأسف، الإجابة الصحيحة هي: " + correct);
    }
    document.getElementById('score-board').innerText = "النتيجة: " + score;
    nextQuestion();
}

function nextQuestion() {
    currentQIndex++;
    displayQuestion();
}

// ابدأ العمل فوراً
loadQuestionsFromDB();

</script>

</body>
</html>
