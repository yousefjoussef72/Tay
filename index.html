<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ ساحة بوكاسا | مملكة يوسف علاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --red: #ff003c; --gold: #ffb700; --black: #050505; --dark-glass: rgba(10, 10, 10, 0.85); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); font-family: 'Cairo', sans-serif; color: #fff; overflow: hidden; }
        
        /* واجهة اللعبة الرئيسية */
        .game-container { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; background: #111; border-right: 2px solid var(--red); border-left: 2px solid var(--red); box-shadow: 0 0 30px rgba(255,0,60,0.2); }
        
        /* شريط المتصدرين (Leaderboard) */
        .header-scores { display: flex; justify-content: space-around; padding: 15px; background: var(--dark-glass); border-bottom: 2px solid var(--gold); }
        .player-score { text-align: center; }
        .player-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); }
        .points { color: var(--gold); font-size: 18px; font-weight: 900; }

        /* منطقة الأسئلة (Game Arena) */
        .question-arena { padding: 20px; text-align: center; background: radial-gradient(circle, #222 0%, #000 100%); min-height: 200px; display: flex; flex-direction: column; justify-content: center; border-bottom: 2px solid #333; }
        .question-text { font-size: 22px; margin-bottom: 20px; color: #fff; text-shadow: 0 0 10px var(--red); }
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-answer { background: #1a1a1a; color: #fff; border: 1px solid var(--red); padding: 15px; border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.3s; font-family: 'Cairo', sans-serif; }
        .btn-answer:hover { background: var(--red); box-shadow: 0 0 15px var(--red); }

        /* منطقة الدردشة (Chat Room) */
        .chat-room { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #0a0a0a; }
        .message { background: #222; padding: 10px 15px; border-radius: 15px; max-width: 80%; width: fit-content; border-right: 3px solid var(--safe); }
        .message.mine { background: #33000b; border-right: none; border-left: 3px solid var(--red); align-self: flex-end; }
        .msg-name { font-size: 11px; color: var(--gold); margin-bottom: 5px; font-weight: bold; }

        /* شريط إرسال الرسائل والريكورد */
        .chat-input-area { display: flex; padding: 15px; background: var(--dark-glass); border-top: 2px solid var(--red); gap: 10px; }
        .chat-input { flex-grow: 1; padding: 12px; border-radius: 20px; border: 1px solid #444; background: #000; color: #fff; outline: none; font-family: 'Cairo'; }
        .btn-send { background: var(--red); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; }
        .btn-mic { background: #222; color: var(--gold); border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header-scores">
            <div class="player-score">
                <img src="https://i.pinimg.com/736x/8e/3c/6e/8e3c6e94819d4511516e8b4e4e60a358.jpg" class="player-avatar">
                <div style="font-size: 12px;">أنت</div>
                <div class="points" id="my-score">0</div>
            </div>
            <div class="player-score">
                <div style="font-size: 24px; margin-top: 10px;">🆚</div>
            </div>
            <div class="player-score">
                <img src="https://i.pinimg.com/736x/2c/86/e5/2c86e57b9cb2ba7e199d7b409cb3a73c.jpg" class="player-avatar">
                <div style="font-size: 12px;">الخصم المجهول</div>
                <div class="points">150</div>
            </div>
        </div>

        <div class="question-arena">
            <div class="question-text" id="q-text">سؤال المبارزة: ما هو اسم أقوى سيف في عالم الأنمي؟</div>
            <div class="answers-grid">
                <button class="btn-answer" onclick="checkAnswer(false)">سيف زابوزا</button>
                <button class="btn-answer" onclick="checkAnswer(true)">يورو (ميهوك)</button>
                <button class="btn-answer" onclick="checkAnswer(false)">سيف إينما</button>
                <button class="btn-answer" onclick="checkAnswer(false)">توتسوكا</button>
            </div>
        </div>

        <div class="chat-room" id="chat-box">
            <div class="message"><div class="msg-name">النظام السيادي</div>⚔️ بدأت المبارزة! أسرع في الإجابة لجمع النقاط.</div>
            <div class="message"><div class="msg-name">الخصم المجهول</div>أنا هفوز عليك يا إمبراطور 😎</div>
        </div>

        <div class="chat-input-area">
            <button class="btn-send btn-mic" onclick="voiceAlert()">🎙️</button>
            <input type="text" id="msg-input" class="chat-input" placeholder="اكتب رسالتك للمبارزين...">
            <button class="btn-send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let myPoints = 0;

        // دالة الإجابة على الأسئلة وتزويد النقاط
        function checkAnswer(isCorrect) {
            if(isCorrect) {
                myPoints += 50;
                document.getElementById('my-score').innerText = myPoints;
                Swal.fire({ icon: 'success', title: 'ضربة قاضية!', text: 'إجابة صحيحة +50 نقطة', timer: 1500, showConfirmButton: false });
            } else {
                Swal.fire({ icon: 'error', title: 'خطأ!', text: 'الخصم اقترب من الفوز', timer: 1500, showConfirmButton: false });
            }
        }

        // دالة إرسال رسالة في الشات (محاكاة)
        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(text === "") return;

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="message mine"><div class="msg-name">أنت</div>${text}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight; // النزول لأسفل الشات تلقائياً
        }

        // دالة التنبيه عند الضغط على المايكروفون (مؤقتاً حتى نربط السيرفر)
        function voiceAlert() {
            Swal.fire({
                icon: 'info',
                title: 'نظام الريكورد 🎙️',
                text: 'جاري تجهيز خوادم Firebase لربط الصوت المباشر قريباً يا قائد!',
                confirmButtonColor: '#ff003c'
            });
        }
    </script>
</body>
</html>
