<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ إمبراطورية يوسف علاء | بوكاسا 2026 - التحدي المشترك</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        /* سأستخدم نفس الـ CSS الرائع الخاص بك مع إضافة لمسة للموبايل ولنظام التحديات */
        :root {
            --red: #ff003c; --gold: #ffb700; --dark: #050505; --cyan: #00f3ff;
            --neon-red: 0 0 10px #ff003c, 0 0 20px #ff003c;
        }
        * { box-sizing: border-box; transition: 0.3s; scroll-behavior: smooth; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: white; font-family: 'Cairo', sans-serif; height: 100vh; overflow: hidden; }
        
        /* تحسينات الشبكة (Grid) */
        .imperial-grid { display: grid; grid-template-columns: 280px 1fr 300px; height: 100vh; }
        @media (max-width: 900px) {
            .imperial-grid { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; overflow-y: auto; }
            .side-panel { height: 200px; }
            body { overflow-y: auto; }
        }

        .side-panel { background: rgba(15,15,15,0.9); border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 12px; background: #111; border-bottom: 2px solid var(--red); color: var(--gold); text-align: center; font-weight: 900; }

        .arena-center { display: flex; flex-direction: column; background: radial-gradient(circle, #200 0%, #000 100%); }
        .stats-bar { padding: 10px 20px; background: #000; display: flex; justify-content: space-between; border-bottom: 1px solid var(--gold); }

        .quiz-zone { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #q-text { font-size: 1.6rem; font-weight: 900; margin-bottom: 20px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; max-width: 500px; }
        .action-btn { background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .action-btn:hover { background: var(--red); box-shadow: var(--neon-red); }

        /* الشات */
        #chat-flow { flex-grow: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 8px 12px; border-radius: 12px; background: #222; font-size: 0.85rem; width: fit-content; max-width: 90%; }
        .bubble.me { align-self: flex-end; background: #400; border-right: 3px solid var(--red); }

        /* نظام إضافة الأسئلة */
        .add-q-btn { position: fixed; bottom: 80px; left: 20px; background: var(--cyan); color: #000; border: none; padding: 12px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; z-index: 100; box-shadow: 0 0 15px var(--cyan); }
    </style>
</head>
<body>

<div id="gate-screen" style="position:fixed; inset:0; background:#000; z-index:10000; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center; padding:30px; border:2px solid var(--red); border-radius:20px; width:90%; max-width:400px;">
        <h1 style="color:var(--gold); font-family:'Orbitron';">BOKASA</h1>
        <input type="text" id="p-name" placeholder="اسمك القتالي..." style="width:100%; padding:15px; margin:20px 0; border-radius:10px; border:1px solid var(--cyan); background:#111; color:#fff; text-align:center;">
        <button class="action-btn" style="width:100%;" onclick="enterArena()">دخول الإمبراطورية ⚔️</button>
    </div>
</div>

<button class="add-q-btn" onclick="openAddQuestionModal()" title="أرسل تحدي للأعداء">➕</button>

<div class="imperial-grid">
    <div class="side-panel">
        <div class="panel-header">🏆 قائمة الشرف</div>
        <div id="leaderboard-ui" style="padding:10px;"></div>
    </div>

    <div class="arena-center">
        <div class="stats-bar">
            <div>👤 <span id="ui-name">---</span></div>
            <div style="color:var(--gold)">PTS: <span id="ui-score">0</span></div>
        </div>
        <div class="quiz-zone">
            <div id="q-category" style="color:var(--cyan); font-weight:bold; margin-bottom:10px;"></div>
            <div id="q-text">في انتظار التحدي...</div>
            <div class="btn-grid" id="opt-container">
                <button class="action-btn" onclick="loadNextQuestion()">ابدأ المواجهة 🔥</button>
            </div>
        </div>
    </div>

    <div class="side-panel">
        <div class="panel-header">💬 رادار المحاربين</div>
        <div id="chat-flow"></div>
        <div style="padding:10px; background:#0a0a0a; display:flex; gap:5px;">
            <input type="text" id="chat-in" placeholder="تكلم..." style="flex-grow:1; background:#111; border:1px solid #444; color:white; padding:8px; border-radius:5px;">
            <button onclick="broadcast()" style="background:var(--red); border:none; color:white; padding:8px; border-radius:5px;">➤</button>
        </div>
    </div>
</div>

<script>
    // ⚙️ Firebase (نفس إعداداتك الأصلية)
    const firebaseConfig = {
        apiKey: "AIzaSyDXr5aORgONB7Cvq9qTru3Y_v0-dLzVYNA",
        authDomain: "tay-game.firebaseapp.com",
        databaseURL: "https://tay-game-default-rtdb.firebaseio.com",
        projectId: "tay-game",
        storageBucket: "tay-game.firebasestorage.app",
        messagingSenderId: "313499272374",
        appId: "1:313499272374:web:26b693f457239555365217"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "";
    let myScore = 0;
    let localBank = [
        {t: "سيستم", q: "من هو مؤسس الساحة؟", o: ["يوسف علاء", "مجهول"], a: 0}
    ];

    function enterArena() {
        const n = document.getElementById('p-name').value.trim();
        if(n.length < 2) return;
        myName = n;
        document.getElementById('ui-name').innerText = n;
        document.getElementById('gate-screen').style.display = 'none';
        
        listenToCloudQuestions(); // البدء في استقبال أسئلة الناس فوراً
        syncLeaderboard();
        syncChat();
    }

    // --- ⚔️ نظام "تحدي الأصدقاء" ---
    async function openAddQuestionModal() {
        const { value: formValues } = await Swal.fire({
            title: 'أرسل سؤالاً للجميع ⚔️',
            html:
                '<input id="swal-q" class="swal2-input" placeholder="السؤال">' +
                '<input id="swal-o1" class="swal2-input" placeholder="الإجابة الصحيحة">' +
                '<input id="swal-o2" class="swal2-input" placeholder="إجابة خاطئة 1">' +
                '<input id="swal-o3" class="swal2-input" placeholder="إجابة خاطئة 2">',
            focusConfirm: false,
            preConfirm: () => {
                return [
                    document.getElementById('swal-q').value,
                    document.getElementById('swal-o1').value,
                    document.getElementById('swal-o2').value,
                    document.getElementById('swal-o3').value
                ]
            }
        });

        if (formValues && formValues[0]) {
            const newQ = {
                t: "تحدي من " + myName,
                q: formValues[0],
                o: [formValues[1], formValues[2], formValues[3]].sort(() => Math.random() - 0.5),
                a: 0 // برمجياً سنبحث عن مكان الإجابة الصحيحة
            };
            // تحديد مكان الإجابة الصحيحة بعد الخلط
            newQ.a = newQ.o.indexOf(formValues[1]);
            
            db.ref('community_questions').push(newQ);
            Swal.fire('تم النشر!', 'سؤالك الآن يظهر لكل المحاربين', 'success');
        }
    }

    // --- 📡 نظام تحديث الأسئلة "كل شوية" ---
    function listenToCloudQuestions() {
        db.ref('community_questions').on('child_added', snap => {
            const q = snap.val();
            localBank.push(q); // إضافة السؤال الجديد للبنك المحلي فور وصوله من أي لاعب
            console.log("استقبلنا تحدي جديد!");
        });
    }

    function loadNextQuestion() {
        const q = localBank[Math.floor(Math.random() * localBank.length)];
        document.getElementById('q-category').innerText = q.t;
        document.getElementById('q-text').innerText = q.q;
        const container = document.getElementById('opt-container');
        container.innerHTML = '';
        
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'action-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if(i === q.a) {
                    myScore += 100;
                    confetti();
                    db.ref('leaderboard/'+myName).set(myScore);
                    document.getElementById('ui-score').innerText = myScore;
                    loadNextQuestion();
                } else {
                    Swal.fire('خطأ!', 'هذا المحارب هزمك بسؤاله!', 'error');
                }
            };
            container.appendChild(btn);
        });
    }

    // --- أنظمة المزامنة المعتادة ---
    function syncLeaderboard() {
        db.ref('leaderboard').orderByValue().limitToLast(5).on('value', s => {
            const ui = document.getElementById('leaderboard-ui');
            ui.innerHTML = '';
            let list = [];
            s.forEach(c => list.push({n: c.key, s: c.val()}));
            list.reverse().forEach((p, i) => {
                ui.innerHTML += `<div style="padding:8px; border-bottom:1px solid #222;">#${i+1} ${p.n} - ${p.s}</div>`;
            });
        });
    }

    function broadcast() {
        const m = document.getElementById('chat-in').value;
        if(!m) return;
        db.ref('chat').push({u: myName, m: m});
        document.getElementById('chat-in').value = '';
    }

    function syncChat() {
        db.ref('chat').limitToLast(10).on('child_added', s => {
            const d = s.val();
            const f = document.getElementById('chat-flow');
            const b = document.createElement('div');
            b.className = 'bubble ' + (d.u === myName ? 'me' : '');
            b.innerHTML = `<b>${d.u}:</b> ${d.m}`;
            f.appendChild(b);
            f.scrollTop = f.scrollHeight;
        });
    }
</script>
</body>
</html>
