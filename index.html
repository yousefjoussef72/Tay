<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ ساحة بوكاسا الإمبراطورية | يوسف علاء</title>
    
    <script src="//code.tidio.co/zyvkc7ncduxovlbfvlzkafbxwbdxj73y.js" async></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --red: #ff003c; --gold: #ffb700; --black: #050505; --white: #ffffff; }
        body, html { margin: 0; padding: 0; background: var(--black); font-family: 'Cairo', sans-serif; color: var(--white); height: 100vh; overflow: hidden; }
        
        .main-container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; border: 3px solid var(--red); background: radial-gradient(circle, #1a0005 0%, #000 100%); position: relative; }

        /* شريط المعلومات */
        .info-header { display: flex; justify-content: space-around; padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); box-shadow: 0 5px 15px rgba(255,0,60,0.3); }
        .stat-box { text-align: center; }
        .stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        /* منطقة التحدي */
        .challenge-zone { padding: 30px 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; position: relative; }
        #q-text { font-size: 24px; font-weight: 900; margin-bottom: 30px; line-height: 1.4; transition: 0.3s; }
        
        .timer-container { width: 100%; height: 6px; background: #222; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--red); transition: width 1s linear; box-shadow: 0 0 10px var(--red); }

        /* أزرار الإجابات */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-opt { background: rgba(255, 255, 255, 0.05); border: 2px solid var(--red); color: white; padding: 18px 10px; border-radius: 15px; font-family: 'Cairo'; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-opt:hover { background: var(--red); box-shadow: 0 0 20px var(--red); transform: translateY(-3px); }
        .btn-opt:active { transform: scale(0.95); }

        /* الرتبة الحالية */
        .rank-tag { position: absolute; top: 10px; right: 10px; background: var(--gold); color: black; padding: 2px 10px; border-radius: 5px; font-size: 11px; font-weight: 900; }

        /* تذييل الصفحة */
        .footer-shatta { padding: 10px; text-align: center; font-size: 12px; color: #444; border-top: 1px solid #222; }
        .start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn-start { background: var(--gold); color: black; padding: 20px 50px; border-radius: 50px; font-size: 22px; font-weight: 900; border: none; cursor: pointer; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,183,0,0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255,183,0,0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,183,0,0); } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="start-screen" id="start-screen">
        <h1 style="color: var(--red); font-size: 35px; margin-bottom: 10px;">⚔️ مبارزة بوكاسا</h1>
        <p style="margin-bottom: 30px; color: #ccc;">35 سؤالاً تفصلك عن لقب "جنرال المملكة"</p>
        <button class="btn-start" onclick="beginAdventure()">إبدأ القتال</button>
    </div>

    <div class="rank-tag" id="rank-display">رتبة: مبتدئ</div>

    <div class="info-header">
        <div class="stat-box"><div class="stat-label">المجموع</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-box"><div class="stat-label">المرحلة</div><div class="stat-value" id="q-count">1/35</div></div>
        <div class="stat-box"><div class="stat-label">الوقت</div><div class="stat-value" id="sec">12</div></div>
    </div>

    <div class="challenge-zone">
        <div class="timer-container"><div id="timer-bar"></div></div>
        <h2 id="q-text">هل أنت جاهز لتحدي يوسف علاء؟</h2>
        
        <div class="options-grid" id="options-box">
            </div>
    </div>

    <div class="footer-shatta">تحدث مع يوسف عبر أيقونة الشات بالأسفل 💬</div>
</div>

<script>
    const questions = [
        { q: "ما هي عاصمة مصر؟", o: ["الاسكندرية", "القاهرة", "الجيزة", "الأقصر"], a: 1 },
        { q: "من هو 'الدون' في عالم كرة القدم؟", o: ["ميسي", "نيمار", "رونالدو", "مبابي"], a: 2 },
        { q: "أقوى ضربة في ون بيس؟", o: ["باجورنغ جن", "جاتلينج", "ريد هوك", "سورو"], a: 0 },
        { q: "ناتج 10 + 20 × 0؟", o: ["0", "30", "10", "20"], a: 2 },
        { q: "ما هو أسرع كائن حي؟", o: ["الأسد", "الصقر", "الفهد", "السمك"], a: 1 },
        { q: "كم عدد سور القرآن الكريم؟", o: ["110", "114", "116", "120"], a: 1 },
        { q: "ما هو أكبر كوكب في المجموعة الشمسية؟", o: ["الأرض", "زحل", "المشتري", "المريخ"], a: 2 },
        { q: "من هو مؤلف ناروتو؟", o: ["أودا", "كوبو", "كيشيموتو", "تورياما"], a: 2 },
        { q: "أين تقع الكعبة المشرفة؟", o: ["المدينة", "مكة", "القدس", "الرياض"], a: 1 },
        { q: "كم عدد ألوان قوس قزح؟", o: ["5", "6", "7", "8"], a: 2 },
        { q: "ما هو الشيء الذي لا يمشي إلا بالضرب؟", o: ["المسمار", "الباب", "الحذاء", "الطاولة"], a: 0 },
        { q: "معدن سائل؟", o: ["الحديد", "الزئبق", "النحاس", "القصدير"], a: 1 },
        { q: "ما هو صوت القطة؟", o: ["صهيل", "نباح", "مواء", "زئير"], a: 2 },
        { q: "كم عدد قارات العالم؟", o: ["5", "6", "7", "8"], a: 2 },
        { q: "ما هو الحيوان الذي يلقب بسفينة الصحراء؟", o: ["الحصان", "الجمل", "الفيل", "الحمار"], a: 1 },
        { q: "من هو مكتشف أمريكا؟", o: ["نيوتن", "كولومبوس", "ماجلان", "إديسون"], a: 1 },
        { q: "كم شهراً يحتوي على 28 يوماً؟", o: ["شهر واحد", "فبراير فقط", "كل الشهور", "لا يوجد"], a: 2 },
        { q: "ما هو البحر الذي لا يغرق فيه أحد؟", o: ["البحر الأحمر", "البحر الميت", "البحر الأسود", "المتوسط"], a: 1 },
        { q: "ملك الغابة هو؟", o: ["الفيل", "الأسد", "النمر", "الذئب"], a: 1 },
        { q: "أين يوجد تمثال الحرية؟", o: ["لندن", "باريس", "نيويورك", "دبي"], a: 2 },
        { q: "ما هي عاصمة السعودية؟", o: ["جدة", "مكة", "الرياض", "الدمام"], a: 2 },
        { q: "أطول نهر في العالم؟", o: ["الأمازون", "النيل", "الفرات", "دجلة"], a: 1 },
        { q: "من هو هداف ليفربول الحالي؟", o: ["ماني", "صلاح", "نونييز", "دياز"], a: 1 },
        { q: "ما هو لون دم الكركند؟", o: ["أحمر", "أزرق", "أخضر", "أبيض"], a: 1 },
        { q: "أصغر دولة في العالم؟", o: ["موناكو", "الفاتيكان", "مالطا", "قطر"], a: 1 },
        { q: "ما هو العضو المسؤول عن تصفية الدم؟", o: ["القلب", "الكبد", "الرئة", "الكلية"], a: 3 },
        { q: "من هو بطل أنمي بلاك كلوفر؟", o: ["يونو", "أستا", "يامي", "نويل"], a: 1 },
        { q: "ما هي عملة اليابان؟", o: ["الدولار", "اليورو", "الين", "الريال"], a: 2 },
        { q: "كم قلباً للأخطبوط؟", o: ["واحد", "اثنان", "ثلاثة", "أربعة"], a: 2 },
        { q: "أين تقع الأهرامات؟", o: ["مصر", "السودان", "المكسيك", "الصين"], a: 0 },
        { q: "ما هو أكبر حيوان في العالم؟", o: ["الفيل", "الحوت الأزرق", "الزرافة", "القرش"], a: 1 },
        { q: "من هو مخترع الهاتف؟", o: ["إديسون", "جراهام بيل", "تسلا", "دا فينشي"], a: 1 },
        { q: "ما هو الشيء الذي يقرأ ولا يكتب؟", o: ["الكتاب", "القلم", "المخ", "الساعة"], a: 0 },
        { q: "ما هو لون الشمس؟", o: ["أصفر", "أبيض", "برتقالي", "أحمر"], a: 1 },
        { q: "من هو إمبراطور هذه اللعبة؟", o: ["أنا", "الكمبيوتر", "يوسف علاء", "لا أحد"], a: 2 }
    ];

    let current = 0;
    let score = 0;
    let timer;
    let sec = 12;

    function beginAdventure() {
        document.getElementById('start-screen').style.display = 'none';
        loadQ();
    }

    function loadQ() {
        if(current >= questions.length) {
            winGame();
            return;
        }
        sec = 12;
        updateUI();
        const data = questions[current];
        document.getElementById('q-text').innerText = data.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-opt';
            btn.innerText = opt;
            btn.onclick = () => check(i);
            box.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        clearInterval(timer);
        const bar = document.getElementById('timer-bar');
        bar.style.width = "100%";
        timer = setInterval(() => {
            sec--;
            document.getElementById('sec').innerText = sec;
            bar.style.width = (sec/12 * 100) + "%";
            if(sec <= 0) {
                clearInterval(timer);
                check(-1);
            }
        }, 1000);
    }

    function check(i) {
        clearInterval(timer);
        if(i === questions[current].a) {
            score += 100;
            showFeedback("عاش يا وحش! 🔥", "success");
        } else {
            showFeedback("ركز شوية يا بطل! 💀", "error");
        }
        current++;
        updateRank();
        setTimeout(loadQ, 1200);
    }

    function showFeedback(msg, icon) {
        Swal.fire({
            title: msg,
            icon: icon,
            toast: true,
            position: 'top',
            showConfirmButton: false,
            timer: 1000,
            background: '#111',
            color: '#fff'
        });
    }

    function updateRank() {
        const rank = document.getElementById('rank-display');
        if(score > 3000) rank.innerText = "رتبة: صديق يوسف الإمبراطور 👑";
        else if(score > 2000) rank.innerText = "رتبة: جنرال المملكة 🎖️";
        else if(score > 1000) rank.innerText = "رتبة: مقاتل محترف ⚔️";
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('q-count').innerText = `${current + 1}/35`;
    }

    function winGame() {
        Swal.fire({
            title: 'انتهت المعركة!',
            text: `نقاطك: ${score} - راسل يوسف الآن لتوثيق رتبتك!`,
            icon: 'info',
            confirmButtonText: 'إرسال النتيجة ليوسف ⚔️',
            background: '#000',
            color: '#ffb700'
        }).then(() => {
            // فتح تيديو تلقائياً عند النهاية
            if(window.tidioChatApi) window.tidioChatApi.show();
        });
    }
</script>

</body>
</html>
